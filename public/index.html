<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kanisaito</title>
    <link rel="stylesheet" href="stylesheet.css">
</head>
<body>
    <button id="change">教員を選択式で入力する</button>
    <p>評価の検索</p>
    <input type="text" placeholder="教師" id="search_input" list="teacher_list">
    <select id="search_select">
        <option value="">教員を選択</option>
    </select>
    <div id="evaluation"></div>
    <p>コメント</p>
    <ul id="list"></ul>
    <form id="form">
        <p>フォーム</p>
        <input type="text" id="teacher_input" name="teacher"  placeholder="教員" list="teacher_list">
        <select name="teacher" id="teacher_select">
            <option value="">教員を選択</option>
        </select>
        <p>コメント(自由記述)</p>
        <input type="text" id="message" name="message" placeholder="評価">
        <p>出席</p><input type="number" step="1" min="1" max="5" name="attendance">
        <p>わかりやすさ</p><input type="number" step="1" min="1" max="5" name="understand">
        <p>甘さ</p><input type="number" step="1" min="1" max="5" name="kind">
        <p>誠実さ</p><input type="number" step="1" min="1" max="5" name="earnest">
        <p>信仰度</p><input type="number" step="1" min="1" max="5" name="belief">
        <button type="submit" id="button">送信</button>
    </form>
    <datalist id="teacher_list"></datalist>
    <div id="warning"></div>
    <script src="script.js"></script>
</body>
</html>
